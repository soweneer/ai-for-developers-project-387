name: lighthouse

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      url:
        description: "URL для проверки"
        required: false
        default: "https://cal-app-production.up.railway.app"

concurrency:
  group: lighthouse
  cancel-in-progress: false

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      TARGET_URL: ${{ inputs.url || 'https://cal-app-production.up.railway.app' }}
      MIN_SCORE: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Lighthouse CLI
        run: |
          mkdir -p lighthouse-report
          npx --yes lighthouse@^12 "$TARGET_URL" \
            --output=json --output=html \
            --output-path=./lighthouse-report/report \
            --only-categories=performance,accessibility,best-practices,seo \
            --chrome-flags="--headless=new --no-sandbox --disable-gpu"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report-${{ github.run_id }}
          path: lighthouse-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Summarize report and track regressions
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const reportDir = 'lighthouse-report';
            const jsonFile = fs.readdirSync(reportDir).find((f) => f.endsWith('.json'));
            const report = JSON.parse(fs.readFileSync(path.join(reportDir, jsonFile), 'utf8'));

            const minScore = Number(process.env.MIN_SCORE);
            const targetUrl = process.env.TARGET_URL;
            const categoryOrder = ['performance', 'accessibility', 'best-practices', 'seo'];

            const results = categoryOrder.map((key) => {
              const category = report.categories[key];
              const score = Math.round(category.score * 100);
              const failingAudits = category.auditRefs
                .map((ref) => report.audits[ref.id])
                .filter((a) => a && a.score !== null && a.score < 0.9)
                .sort((a, b) => a.score - b.score)
                .slice(0, 10);
              return { key, title: category.title, score, failingAudits };
            });

            const failing = results.filter((r) => r.score < minScore);

            const fixSections = failing
              .filter((r) => r.failingAudits.length > 0)
              .map((r) => {
                const items = r.failingAudits
                  .map((a) => `- [ ] **${a.title}** (${Math.round(a.score * 100)}) — ${a.description.split('. ')[0]}.`)
                  .join('\n');
                return `### ${r.title} — ${r.score}\n\n${items}`;
              });

            await core.summary
              .addHeading(`Lighthouse report — ${new Date().toISOString().slice(0, 10)}`)
              .addLink('Проверенный URL', targetUrl)
              .addTable([
                [
                  { data: 'Категория', header: true },
                  { data: 'Оценка', header: true },
                  { data: 'Статус', header: true },
                ],
                ...results.map((r) => [r.title, String(r.score), r.score < minScore ? '❌' : '✅']),
              ])
              .write();

            if (fixSections.length > 0) {
              await core.summary.addRaw(`\n\n## Нужно починить\n\n${fixSections.join('\n\n')}`, true).write();
            }

            const label = 'lighthouse-nightly';
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });
            const existing = openIssues[0];
            const scoreLine = results.map((r) => `${r.title}: ${r.score}`).join(' · ');

            if (failing.length > 0) {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              const body = [
                `Проверка: ${targetUrl}`,
                `Запуск: [${context.runId}](${runUrl})`,
                '',
                `**Оценки:** ${scoreLine}`,
                '',
                '## Правки, которые нужно внести',
                '',
                fixSections.join('\n\n') ||
                  '_Категория ниже порога, но конкретные аудиты не найдены — см. полный отчёт в артефакте._',
              ].join('\n');

              if (existing) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body,
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body: `Регресс подтверждён повторно (${scoreLine}). Запуск: ${runUrl}`,
                });
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: 'Lighthouse: обнаружен регресс',
                  body,
                  labels: [label],
                });
              }
            } else if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Метрики снова в норме (${scoreLine}) — закрываю issue.`,
              });
            }
